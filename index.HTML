<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WiFi Loading</title>

    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #111;
            overflow: hidden;
            padding: 10px;
        }
        
        .wifi {
            position: relative;
            width: 120px;
            height: 120px;
        }
        /* WiFi Arcs */
        
        .wifi .arc {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            border: 4px solid #2fabab;
            border-radius: 50%;
            border-color: #5f9c9c transparent transparent transparent;
            animation: transformArc 1.5s infinite;
        }
        
        .wifi .arc:nth-child(1) {
            width: 40px;
            height: 40px;
            animation-delay: 0s;
        }
        
        .wifi .arc:nth-child(2) {
            width: 70px;
            height: 70px;
            animation-delay: 0.2s;
        }
        
        .wifi .arc:nth-child(3) {
            width: 100px;
            height: 100px;
            animation-delay: 0.4s;
        }
        /* Center Dot */
        
        .wifi .dot {
            position: absolute;
            left: 50%;
            top: 50%;
            width: 12px;
            height: 12px;
            background: #8c9696;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: dotPulse 1.5s infinite;
        }
        /* Loading Text */
        
        .loading-text {
            position: absolute;
            bottom: -50px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-size: 18px;
            font-family: Arial, sans-serif;
            letter-spacing: 2px;
        }
        /* Arc Animation */
        
        @keyframes transformArc {
            0% {
                transform: translate(-50%, -50%) rotate(0deg) scale(0.8);
                opacity: 0.6;
            }
            50% {
                transform: translate(-50%, -50%) rotate(15deg) scale(1.1);
                opacity: 1;
            }
            100% {
                transform: translate(-50%, -50%) rotate(0deg) scale(0.8);
                opacity: 0.4;
            }
        }
        /* Dot Pulse */
        
        @keyframes dotPulse {
            0%,
            100% {
                transform: translate(-50%, -50%) scale(1);
                opacity: 1;
            }
            50% {
                transform: translate(-50%, -50%) scale(1.4);
                opacity: 0.7;
            }
        }
    </style>
</head>

<body>

    <div class="wifi">
        <div class="arc"></div>
        <div class="arc"></div>
        <div class="arc"></div>
        <div class="dot"></div>

        <div class="loading-text">
            WIFIVILLEIT
        </div>
    </div>

    <script>
        // Wait 4 seconds then go to next page
        setTimeout(function() {
            window.location.href = "clientform.html";
        }, 4000);
    </script>

</body>

</html>
